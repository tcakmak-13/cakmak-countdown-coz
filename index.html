    <!-- Splash Screen Styling -->
    <style>
      html { 
        background-color: #0a0a0a; 
      }
      
      /* PWA Splash Screen Animation */
      @keyframes flame-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
      
      #pwa-splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      #pwa-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      
      #pwa-splash .logo {
        width: 80px;
        height: 80px;
        animation: flame-pulse 2s ease-in-out infinite;
      }
      
      #pwa-splash .title {
        margin-top: 16px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.02em;
      }
      
      #pwa-splash .title span {
        color: #f97316;
      }
      
      #pwa-splash .loading {
        margin-top: 32px;
        width: 40px;
        height: 4px;
        background: rgba(249, 115, 22, 0.2);
        border-radius: 2px;
        overflow: hidden;
      }
      
      #pwa-splash .loading::after {
        content: '';
        display: block;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, #f97316, #ea580c);
        border-radius: 2px;
        animation: loading 1.2s ease-in-out infinite;
      }
      
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
    </style>
  </head>
  <body>
    <!-- PWA Splash Screen -->
    <div id="pwa-splash">
      <img class="logo" src="/icons/logo.png" alt="ÇakmakKoçluk" style="border-radius: 50%; object-fit: cover;" />
      <div class="title">Çakmak<span>Koçluk</span></div>
      <div class="loading"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide Splash & Register Service Worker -->
    <script>
      // Hide splash screen after app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('pwa-splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 500);
          }
        }, 800);
      });
      
      // Register Service Worker with scope
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('SW registered:', reg.scope);
              // Check for updates
              reg.addEventListener('updatefound', () => {
                console.log('SW update found');
              });
            })
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
