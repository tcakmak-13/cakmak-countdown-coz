<!doctype html>
<html lang="tr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- SEO & Meta -->
    <title>ÇakmakKoçluk - YKS Koçluk Platformu</title>
    <meta name="description" content="YKS sınavına profesyonel koçluk desteği ile hazırlanın. Kişisel program, canlı geri sayım ve uzman rehberlik." />
    <meta name="author" content="ÇakmakKoçluk" />
    <meta name="keywords" content="YKS, TYT, AYT, koçluk, eğitim, üniversite sınavı, özel ders" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="ÇakmakKoçluk - YKS Koçluk Platformu" />
    <meta property="og:description" content="YKS sınavına profesyonel koçluk desteği ile hazırlanın." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="tr_TR" />
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ÇakmakKoçluk" />
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    
    <!-- Splash screens for iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Prevent FOUC -->
    <style>
      html { background-color: #0a0a0a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
